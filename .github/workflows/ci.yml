name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install uv
      - name: Install project dependencies
        run: |
          python -m uv pip install --python "$(which python)" -r pyproject.toml --group dev
          pnpm install
      - name: Lint
        run: make lint PYTHON="$(which python)"
      - name: Test
        run: make test PYTHON="$(which python)"
      - name: Verify contracts
        run: |
          make contracts
          git diff --exit-code -- packages/contracts/src/openapi.ts
      - name: Verify web build
        run: pnpm --filter @papertrace/web build
